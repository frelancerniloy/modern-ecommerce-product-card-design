<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Compact Product Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .product-card {
            background: #fff;
            width: 260px; /* কার্ডের প্রস্থ আরও কমানো হয়েছে */
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            overflow: hidden;
            position: relative;
            transition: 0.3s;
            border: 1px solid #eee;
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        /* SQUARE IMAGE */
        .image-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        .product-card:hover .image-container img {
            transform: scale(1.08);
        }

        /* Badges & Actions over Image */
        .discount-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: #ff3b30;
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 700;
            z-index: 2;
        }

        .top-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 2;
        }

        .action-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #444;
            font-size: 12px;
            transition: 0.2s;
        }

        .action-btn:hover {
            background: #ff3b30;
            color: white;
        }

        /* --- CONTENT AREA (Ultra Compact) --- */
        .product-info {
            padding: 10px; /* প্যাডিং একদম কম */
        }

        /* TITLE: 2 Lines Max with Ellipsis (...) */
        .product-title {
            font-size: 14px;
            font-weight: 600;
            color: #222;
            margin-bottom: 6px;
            line-height: 1.3;
            
            /* Magic Code for 2 Lines */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 36px; /* 2 লাইনের হাইট ফিক্সড রাখা হয়েছে */
        }

        /* Price & Rating Row */
        .price-rating-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .price-area {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .current-price {
            font-size: 16px;
            font-weight: 700;
            color: #333;
        }

        .old-price {
            font-size: 11px;
            text-decoration: line-through;
            color: #aaa;
        }

        .rating {
            font-size: 10px;
            color: #ffc107;
            display: flex;
            align-items: center;
        }
        .rating span {
            color: #888;
            margin-left: 2px;
        }

        /* Stock & Sold Row */
        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            margin-bottom: 8px;
            color: #666;
        }

        .stock-status {
            color: #27ae60;
            font-weight: 600;
        }

        /* Buttons Grid */
        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 5px;
        }

        .btn {
            padding: 6px 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            transition: 0.2s;
        }

        .btn-cart {
            background: #f2f2f2;
            color: #333;
        }
        .btn-cart:hover { background: #e0e0e0; }

        .btn-order {
            background: #222;
            color: white;
        }
        .btn-order:hover { background: #ff3b30; }

        .btn-inquire {
            width: 100%;
            background: transparent;
            border: 1px dashed #ccc;
            color: #666;
            font-size: 10px;
            padding: 4px 0;
        }
        .btn-inquire:hover {
            border-color: #666;
            color: #333;
            background: #fafafa;
        }

    </style>
</head>
<body>

    <div class="product-card">
        
        <span class="discount-badge">-25%</span>

        <div class="image-container">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Nike Shoe">
            
            <div class="top-actions">
                <button class="action-btn" title="Add to Whitelist"><i class="fa-regular fa-heart"></i></button>
                <button class="action-btn" title="Share"><i class="fa-solid fa-share-nodes"></i></button>
            </div>
        </div>

        <div class="product-info">
            
            <!-- Long Title to test 2 lines -->
            <h3 class="product-title">Nike Air Max 270 React Bauhaus Men's Running Shoes Special Edition</h3>
            
            <div class="price-rating-row">
                <div class="price-area">
                    <span class="current-price">$120</span>
                    <span class="old-price">$160</span>
                </div>
                <div class="rating">
                    <i class="fa-solid fa-star"></i> <span>(4.5)</span>
                </div>
            </div>

            <div class="meta-row">
                <span class="stock-status"><i class="fa-solid fa-circle-check"></i> In Stock</span>
                <span>1.2k Sold</span>
            </div>

            <div class="btn-row">
                <button class="btn btn-cart"><i class="fa-solid fa-cart-shopping"></i> Add</button>
                <button class="btn btn-order">Order</button>
            </div>
            
            <button class="btn btn-inquire">Inquire</button>

        </div>
    </div>

</body>
</html>
